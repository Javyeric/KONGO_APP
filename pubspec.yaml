name: kongo
description: "A Flutter POS application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Icons
  cupertino_icons: ^1.0.8

  # PDF receipt generation
  pdf: ^3.11.1
  printing: ^5.12.0

  # Date & currency formatting
  intl: ^0.20.2

  # State management
  provider: ^6.1.2

  # Image picker for adding product images
  image_picker: ^1.2.1
  cross_file: ^0.3.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/